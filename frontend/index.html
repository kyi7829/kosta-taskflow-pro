<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow Pro</title>

  <!-- 1. 테마 초기화: 깜빡임 방지를 위해 head 최상단 실행 -->
  <script>
    (function () {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <!-- 2. Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- 3. Tailwind 설정: CDN 로드 후 선언해야 darkMode: 'class'가 적용됨 -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'],
          },
        },
      },
    };
  </script>
</head>

<body class="min-h-screen bg-gray-100 dark:bg-gray-950 font-sans transition-colors duration-300">

  <!-- 헤더 -->
  <header class="sticky top-0 z-10 backdrop-blur-md bg-white/80 dark:bg-gray-900/80 border-b border-gray-200 dark:border-gray-800">
    <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
      <h1 class="text-lg font-semibold text-gray-800 dark:text-gray-100">TaskFlow Pro</h1>
      <button
        id="themeBtn"
        class="min-h-[44px] min-w-[44px] flex items-center justify-center rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-xl"
        title="테마 전환"
        aria-label="테마 전환"
      ></button>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-6 space-y-6">

    <!-- 추가 폼 -->
    <section class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-md rounded-xl shadow-lg p-4">
      <h2 class="text-xs font-semibold text-gray-400 dark:text-gray-500 mb-3 uppercase tracking-widest">새 업무</h2>
      <form id="taskForm" class="space-y-3" novalidate>
        <input
          id="newTitle"
          type="text"
          placeholder="업무 제목을 입력하세요 *"
          maxlength="200"
          class="w-full rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 px-4 py-2.5 text-sm text-gray-800 dark:text-gray-100 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-400 transition"
        />
        <div class="flex gap-2 flex-wrap">
          <input
            id="newDueAt"
            type="datetime-local"
            class="flex-1 min-w-[180px] rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 px-4 py-2.5 text-sm text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-400 transition"
          />
          <select
            id="newStatus"
            class="rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 px-4 py-2.5 text-sm text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-400 transition"
          >
            <option value="todo">Todo</option>
            <option value="in_progress">진행 중</option>
            <option value="done">완료</option>
          </select>
        </div>
        <button
          id="addBtn"
          type="submit"
          disabled
          class="w-full min-h-[44px] rounded-xl bg-blue-500 hover:bg-blue-600 disabled:bg-gray-200 dark:disabled:bg-gray-700 disabled:cursor-not-allowed disabled:text-gray-400 dark:disabled:text-gray-500 text-white font-medium text-sm transition-colors"
        >추가</button>
      </form>
    </section>

    <!-- 업무 목록 -->
    <section>
      <h2 class="text-xs font-semibold text-gray-400 dark:text-gray-500 mb-3 uppercase tracking-widest">업무 목록</h2>
      <div id="taskList" class="space-y-3"></div>
    </section>
  </main>

  <!-- 수정 모달 -->
  <div
    id="modalOverlay"
    class="fixed inset-0 z-50 hidden bg-black/40 backdrop-blur-sm flex items-center justify-center px-4"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modalTitle"
  >
    <div class="w-full max-w-md bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-6 space-y-4">
      <h2 id="modalTitle" class="text-base font-semibold text-gray-800 dark:text-gray-100">업무 수정</h2>
      <form id="editForm" class="space-y-3" novalidate>
        <input type="hidden" id="editId" />
        <input
          id="editTitle"
          type="text"
          placeholder="업무 제목 *"
          maxlength="200"
          class="w-full rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 px-4 py-2.5 text-sm text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-400 transition"
        />
        <textarea
          id="editDescription"
          placeholder="업무 설명 (선택)"
          rows="3"
          class="w-full rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 px-4 py-2.5 text-sm text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-400 transition resize-none"
        ></textarea>
        <div class="flex gap-2 flex-wrap">
          <select
            id="editStatus"
            class="rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 px-4 py-2.5 text-sm text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-400 transition"
          >
            <option value="todo">Todo</option>
            <option value="in_progress">진행 중</option>
            <option value="done">완료</option>
          </select>
          <input
            id="editDueAt"
            type="datetime-local"
            class="flex-1 min-w-[180px] rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 px-4 py-2.5 text-sm text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-400 transition"
          />
        </div>
        <div class="flex gap-2 pt-1">
          <button
            type="button"
            id="cancelBtn"
            class="flex-1 min-h-[44px] rounded-xl border border-gray-200 dark:border-gray-700 text-gray-600 dark:text-gray-300 text-sm font-medium hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors"
          >취소</button>
          <button
            type="submit"
            class="flex-1 min-h-[44px] rounded-xl bg-blue-500 hover:bg-blue-600 text-white text-sm font-medium transition-colors"
          >저장</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
